{{layout: base.html}}
<section class="listing listing--tag">
  <header class="listing__header">
    <p class="listing__eyebrow">Tag</p>
    <h1 class="listing__title">#{{tag_name}}</h1>
    <p class="listing__description">{{tag_count}} posts</p>
  </header>
  <div class="listing__content">
    {{content}}
  </div>
</section>
